; ============================================================
; VltkMod6 Configuration File
; For game.exe (game6) - NOT for game_y.exe
; ============================================================

[Patches]
; Enable/disable individual patches (1=enabled, 0=disabled)

; TransLife sprite/data expansion (5 -> 99)
; Includes fill_flash effect fix for TransLife 10+
TransLife=0

; TransLife EXP calculation (uses level_exp.txt)
TransLifeExp=0

; 15 factions support (originally 10)
Factions=0

; Package.ini redirect to Package1.ini
PackageIni=0

; Additional Characters - Enable Male Water Serie and Female Gold Serie
AdditionalCharacters=0

; Renders Extra text above players
RankingHook=1

; Renders Extra text above players
LevelFactionDisplay=1

; Street Shop Height
StreetShopHeight=1

; Party UI
FactionPartyFix=1

; Cleanup Patching
FactionPartyFixDisableCleanup=1

; Level display in member name: "[Level] Name"
FactionPartyFixLevelDisplay=1

; Text color by camp (Justice=Orange, Evil=Pink, etc.)
FactionPartyFixTextColor=1

; Custom window size
WindowSize=0

; NewUI: Master config, controls Trade Info, Right click Unequipp, Right click to correct Boxes
; Comparison Tooltip, MinMax
NewUi=1

; Un-comment to turn off CompareTooltip
; CompareTooltip=0

; Un-comment to turn off TooltipMinMax
; TooltipMinMax=0

;Ranking
Ranking=1

; HP Bar UI for Boss and NPC
HpBar=1

; KillingStreak Mode: 0-OFF, 1-Players Only, 2-Count All (Players and NPCs on All Maps), 3-TongKim only (Player and Sim NPCs).
KillingStreak=0

